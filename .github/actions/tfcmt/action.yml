name: "tfcmt"
description: "tfcmt for pull_request"
inputs:
  cwd:
    description: "terraform plan するディレクトリ"
    required: true
  pr_number:
    description: "コメントするPR number"
    required: true
  TF_VERSION:
    description: "terraform version"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ inputs.TF_VERSION }}

    - name: terraform init
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: terraform init

    - name: "tfcmt"
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: |
        echo curl -s https://opendata-tools.s3.ap-northeast-1.amazonaws.com/tfcmt_linux_amd64.tar.gz | tar zxf - -C /usr/local/bin/ tfcmt
        echo tfcmt --var target:${{ inputs.cwd }} --owner stockmarkteam --repo inter --pr ${{ inputs.pr_number }} plan -patch -skip-no-changes -- terraform plan -no-color
