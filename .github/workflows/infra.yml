name: "infra"

on:
  push:
    paths:
      - infra/**
  pull_request:
    types:
      - closed
    paths:
      - infra/**
    branches:
      - develop
      - release/**
      - main
  workflow_dispatch:

jobs:
  develop:
    if: github.base_ref == 'develop'
    uses: ./.github/workflows/reuse_infra.yml
    with:
      cwd: ./infra/env/develop
      apply: ${{ github.event.pull_request.merged == true }}

  staging:
    if: startsWith(github.base_ref, 'release/')
    uses: ./.github/workflows/reuse_infra.yml
    with:
      cwd: ./infra/env/staging
      apply: false
      # apply: ${{ github.event.pull_request.merged == true }}

  production:
    if: github.base_ref == 'main'
    uses: ./.github/workflows/reuse_infra.yml
    with:
      cwd: ./infra/env/production
      apply: ${{ github.event.pull_request.merged == false }}

  finish:
    runs-on: ubuntu-latest
    needs: [develop, staging, production]
    steps:
      - name: finish
        run: echo "finish"
