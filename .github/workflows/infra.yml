name: "infra"

on:
  push:
    paths:
      - infra/**
  workflow_dispatch:

env:
  ENV: develop
  TF_VERSION: 1.5.0
  AWS_DEFAULT_REGION: ap-northeast-1

jobs:
  develop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: check
        run: |
          ls -la
          pwd
          find

      - name: reuse workflow
        uses: ./.github/workflows/reuse_infra.yml
        with:
          cwd: ./infra/env/develop
          apply: false

  staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: reuse workflow
        uses: ./.github/workflows/reuse_infra.yml
        with:
          cwd: ./infra/env/staging
          apply: false

  production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: reuse workflow
        uses: ./.github/workflows/reuse_infra.yml
        with:
          cwd: ./infra/env/production
          apply: false

  finish:
    runs-on: ubuntu-latest
    needs: [develop, staging, production]
    steps:
      - name: finish
        run: echo "finish"
