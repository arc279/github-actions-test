on:
  workflow_call:
    inputs:
      cwd:
        required: true
        type: string
      apply:
        required: false
        type: boolean
      pr_number:
        required: false
        type: number

env:
  TF_VERSION: 1.5.0
  AWS_DEFAULT_REGION: ap-northeast-1

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        working-directory: ${{ inputs.cwd }}
        run: terraform fmt -check -recursive

      - name: terraform init
        working-directory: ${{ inputs.cwd }}
        run: terraform init

      - name: terraform validate
        working-directory: ${{ inputs.cwd }}
        run: terraform validate

      - name: terraform plan
        working-directory: ${{ inputs.cwd }}
        if: inputs.pr_number
        run: |
          curl -s https://opendata-tools.s3.ap-northeast-1.amazonaws.com/tfcmt_linux_amd64.tar.gz | tar zxf - -C /usr/local/bin/ tfcmt
          tfcmt --var target:${{ inputs.cwd }} --owner stockmarkteam --repo inter --pr ${{ inputs.pr_number }} plan -patch -skip-no-changes -- terraform plan -no-color

      - name: terraform apply
        working-directory: ${{ inputs.cwd }}
        if: inputs.apply == true
        run: terraform apply -no-color -auto-approve
