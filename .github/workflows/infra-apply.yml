name: "infra apply"

on:
  pull_request:
    types:
      - closed
    paths:
      - infra/**
    branches:
      - develop
      - release/**
      - main
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest

    steps:
      - name: show
        run: |
          echo event number: ${{github.event.number}}
          echo event name: ${{ github.event_name }}
          echo event type: ${{ github.event.action }}
          echo merged: ${{ github.event.pull_request.merged }}

          echo '2' ${{ github.ref }}
          echo '3' ${{ github.ref_name }}
          echo '4' ${{ github.head_ref }}
          echo '5' ${{ github.base_ref }}

  develop:
    if: github.base_ref == 'develop'
    uses: ./.github/workflows/reuse_infra.yml
    with:
      cwd: ./infra/env/develop
      apply: ${{ github.event.pull_request.merged }}

  staging:
    if: startsWith(github.base_ref, 'release/')
    uses: ./.github/workflows/reuse_infra.yml
    with:
      cwd: ./infra/env/staging
      apply: ${{ github.event.pull_request.merged }}

  production:
    if: github.base_ref == 'main'
    uses: ./.github/workflows/reuse_infra.yml
    with:
      cwd: ./infra/env/production
      apply: ${{ github.event.pull_request.merged }}

  finish:
    runs-on: ubuntu-latest
    needs: [develop, staging, production]
    steps:
      - name: finish
        run: echo "finish"
