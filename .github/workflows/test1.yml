name: "test1"

on:
  push:
  workflow_dispatch:

env:
  ENV: develop
  TF_VERSION: 1.5.0
  AWS_DEFAULT_REGION: ap-northeast-1
  SECRET_HOGE: ${{ secrets.HOGE }}

jobs:
  test-job1:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: step1
        run: |
          curl -V
          pwd
          ls -la
          echo ${{ env.AWS_DEFAULT_REGION }}
          echo ${{ env.ENV }}
          echo event number: ${{github.event.number}}
          echo event name: ${{ github.event_name }}
          echo event type: ${{ github.event.action }}
          echo merged: ${{ github.event.pull_request.merged }}

          echo '2' ${{ github.ref }}
          echo '3' ${{ github.ref_name }}
          echo '4' ${{ github.head_ref }}
          echo '5' ${{ github.base_ref }}

      - name: step2
        uses: ./.github/actions/assume-role
        with:
          aws_account_id: 123456789012

      - name: step3
        run: |
          echo GITHUB_TOKEN: ${GITHUB_TOKEN}
          echo ${GITHUB_ENV}
          cat ${GITHUB_ENV}
          echo ${AWS_ACCESS_KEY_ID}
          echo ${AWS_SECRET_ACCESS_KEY}
          echo ${AWS_SESSION_TOKEN}

  test-job2:
    uses: ./.github/workflows/reuse_test.yml

  test-job4:
    runs-on: ubuntu-latest

    steps:
      - name: step1
        run: |
          echo SECRET_HOGE: ${SECRET_HOGE}

  test-job3:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: step2
        uses: ./.github/actions/assume-role
        with:
          aws_account_id: 123456789012

      - name: step1
        uses: ./.github/actions/tfcmt
        with:
          cwd: ./infra/env/develop/
          pr_number: 123
          TF_VERSION: ${{ env.TF_VERSION }}

  set-env:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: step1
        run: |
          awk 'NR==1{ print "TF_VERSION=" $1}' infra/.terraform-version >>${GITHUB_ENV}

      - name: step2
        run: |
          echo TF_VERSION: ${TF_VERSION}

  show-env:
    runs-on: ubuntu-latest
    needs: set-env

    steps:
      - name: step1
        run: |
          echo TF_VERSION: ${TF_VERSION}
          which aws
          aws --version
